plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.14'
    id 'org.beryx.runtime' version '1.13.1'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    implementation 'org.apache.poi:poi-ooxml:5.2.5'
    implementation 'org.apache.logging.log4j:log4j-core:2.22.1'
    implementation 'com.sun.mail:jakarta.mail:2.0.1'
    implementation 'org.apache.pdfbox:pdfbox:2.0.30'
}

javafx {
    version = "21.0.1"
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
    mainClass = 'massfilemailer.Launcher'
}

runtime {
    options = ['--strip-debug', '--compress', '2', '--no-header-files', '--no-man-pages']
    modules = ['java.management', 'java.naming', 'java.desktop', 'java.sql', 'java.xml', 'jdk.unsupported', 'jdk.crypto.ec', 'java.security.jgss', 'java.security.sasl']
    
    jpackage {
        if (org.gradle.internal.os.OperatingSystem.current().windows) {
            installerType = 'exe'
            installerOptions = ['--win-dir-chooser', '--win-menu', '--win-shortcut']
        }
    }
}
